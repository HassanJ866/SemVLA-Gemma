# Adapter: franka_7dof_position_parallel
# Targets LIBERO-Spatial Panda robot (OSC_POSE delta, 7-DOF)

run_name: adapter_franka_7dof

# Arm spec
arm_class:    franka_7dof_position_parallel
action_dim:   7
state_dim:    9     # robot_states shape in the HDF5
chunk_size:   16
graph_feat_dim: 64

# Architecture
hidden:   256
n_heads:  4
n_blocks: 4
ffn_mult: 4

# Data
train_jsonl: data/splits/adapter_franka.jsonl
val_jsonl:   data/splits/adapter_franka_val.jsonl

# Optimiser
peak_lr:      1.0e-4
min_lr:       2.5e-6
beta1:        0.9
beta2:        0.95
warmup_steps: 100
max_steps:    30000

# Flow matching
batch_size:      64
tau_alpha:       1.5
tau_beta:        1.0
n_flow_steps:    10

# Logging & checkpointing
log_steps:  200
eval_steps: 2000
save_steps: 5000
output_dir: ckpts/franka_7dof

# Experiment tracking
wandb_project: headless-vla
