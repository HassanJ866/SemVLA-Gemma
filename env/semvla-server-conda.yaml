name: semvla-server
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12.6
  - pip=24.3.1
  - git
  - cmake>=3.29,<4.2
  - ninja
  - ffmpeg
  - libgcc-ng
  - libstdcxx-ng
  - pip:
      # Keep this torch/vision pair aligned with the local lerobot constraints.
      - torch==2.10.0
      - torchvision==0.25.0
      - torchaudio==2.10.0
      # Pin NumPy/SciPy together to avoid ABI mismatches.
      - numpy==2.2.6
      - scipy==1.17.1
      - transformers==5.3.0
      - accelerate==1.13.0
      - peft==0.18.1
      - datasets==4.6.1
      - huggingface-hub==1.6.0
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - h5py==3.16.0
      - wandb==0.24.2
      - opencv-python==4.13.0.92
      - opencv-python-headless==4.12.0.88
      - outlines
      # Unsloth is required by brain training + merge script.
      - unsloth
      # Install project package and LeRobot extras used by SemVLA training.
      - -e ./lerobot[smolvla,libero,training]
